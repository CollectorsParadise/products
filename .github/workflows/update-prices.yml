name: Update Booster Box Prices

on:
  schedule:
    - cron: '0 8 * * *'   # Runs at 8 AM UTC
    - cron: '0 20 * * *'  # Runs at 8 PM UTC
  workflow_dispatch:       # Manual trigger button

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch eBay sold prices
        run: node scripts/fetch-prices.js

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices-live.json
          git diff --cached --quiet || git commit -m "chore: update booster box prices $(date -u +%Y-%m-%d)"
          git push
