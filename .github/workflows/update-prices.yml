name: Update Booster Box Prices

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: '22'

      - name: Fetch eBay sold prices
        run: node scripts/fetch-prices.js
        continue-on-error: false

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp prices-live.json /tmp/prices-live.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/prices-live.json prices-live.json
          git add prices-live.json
          if git diff --cached --quiet; then
            echo "No price changes to commit"
          else
            git commit -m "chore: update prices $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
