name: Update Booster Box Prices

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: '22'

      - name: Fetch eBay sold prices
        run: node scripts/fetch-prices.js

      - name: Upload prices via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the current file SHA (if it exists)
          SHA=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/prices-live.json" \
            | jq -r '.sha // empty')

          # Base64 encode the file
          CONTENT=$(base64 -w 0 prices-live.json)

          # Build JSON payload
          if [ -n "$SHA" ]; then
            PAYLOAD=$(jq -n --arg msg "chore: update prices $(date -u +%Y-%m-%d_%H:%M)" \
              --arg content "$CONTENT" \
              --arg sha "$SHA" \
              '{message: $msg, content: $content, sha: $sha}')
          else
            PAYLOAD=$(jq -n --arg msg "chore: add prices $(date -u +%Y-%m-%d_%H:%M)" \
              --arg content "$CONTENT" \
              '{message: $msg, content: $content}')
          fi

          # Push via API
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/prices-live.json" \
            -d "$PAYLOAD")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✓ prices-live.json updated successfully"
          else
            echo "✗ Failed with HTTP $HTTP_CODE"
            cat /tmp/response.json
            exit 1
          fi
