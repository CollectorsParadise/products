<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collector's Paradise — Box Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--card-hover:#1c2333;--border:#30363d;--text:#e6edf3;--text-dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--modal-bg:#0d1117ee}
[data-theme="light"]{--bg:#f0f2f5;--card:#ffffff;--card-hover:#f8f9fa;--border:#d0d7de;--text:#1f2328;--text-dim:#656d76;--accent:#0969da;--green:#1a7f37;--red:#cf222e;--yellow:#9a6700;--modal-bg:#f0f2f5ee}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;min-height:100vh}
header{background:linear-gradient(135deg,#161b22,#1a1f2e);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
[data-theme="light"] header{background:linear-gradient(135deg,#ffffff,#f0f2f5)}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{width:48px;height:48px;border-radius:10px;object-fit:cover}
.brand h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand span{font-size:12px;color:var(--text-dim);display:block;margin-top:2px}
.controls{padding:16px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;width:280px;outline:none;transition:border .2s}
.search:focus{border-color:var(--accent)}
.filters{display:flex;gap:6px}
.filter-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 16px;color:var(--text-dim);font-size:13px;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.count{margin-left:auto;color:var(--text-dim);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:8px 24px 40px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .25s;display:flex;gap:16px;align-items:flex-start}
.card:hover{border-color:var(--accent);background:var(--card-hover);transform:translateY(-2px);box-shadow:0 8px 24px #00000040}
.card img{width:100px;height:100px;object-fit:contain;border-radius:8px;background:#1a1f2e;flex-shrink:0}
[data-theme="light"] .card img{background:#e8ecf0}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-code{font-size:11px;color:var(--text-dim);margin-bottom:8px}
.card-price{font-size:22px;font-weight:700;margin-bottom:4px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:12px;margin-bottom:8px}
.pill.rising{background:#3fb95020;color:var(--green)}
.pill.falling{background:#f8514920;color:var(--red)}
.pill.stable{background:#d2992220;color:var(--yellow)}
.card-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px;color:var(--text-dim)}
.card-meta b{color:var(--text);font-weight:500}
.modal-overlay{position:fixed;inset:0;background:var(--modal-bg);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-dim);font-size:24px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-header{display:flex;gap:20px;margin-bottom:20px;align-items:flex-start}
.modal-header img{width:120px;height:120px;object-fit:contain;border-radius:12px;background:#1a1f2e}
[data-theme="light"] .modal-header img{background:#e8ecf0}
.modal-title{font-size:20px;font-weight:700;margin-bottom:4px}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-box{background:var(--bg);border-radius:8px;padding:12px;text-align:center}
.stat-box .label{font-size:11px;color:var(--text-dim);margin-bottom:4px}
.stat-box .value{font-size:16px;font-weight:700}
.chart-container{background:var(--bg);border-radius:8px;padding:16px}
.chart-container h3{font-size:13px;color:var(--text-dim);margin-bottom:12px}
.empty{text-align:center;padding:60px 24px;color:var(--text-dim);font-size:15px}
.theme-toggle{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="/images/CP LOGO.png" alt="Collector's Paradise" class="brand-logo">
    <div><h1>Collector's Paradise</h1><span>Japanese Pokémon Booster Box Market</span></div>
  </div>
  <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
    <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</header>
<div class="controls">
  <input class="search" type="text" placeholder="Search by name or set code..." id="search">
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="sv">Scarlet &amp; Violet</button>
    <button class="filter-btn" data-filter="m">Mega / M-Series</button>
  </div>
  <div class="count" id="count"></div>
</div>
<div class="grid" id="grid"></div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">&times;</button>
    <div class="modal-header"><img id="m-img"><div><div class="modal-title" id="m-name"></div><div class="card-code" id="m-code"></div><div class="card-price" id="m-price"></div><div id="m-pill"></div></div></div>
    <div class="modal-stats" id="m-stats"></div>
    <div class="chart-container"><h3>Price History (Estimated Market Trajectory)</h3><canvas id="m-chart"></canvas></div>
  </div>
</div>
<script>
const MARKET={
"Scarlet ex Booster Box (sv1S)":{release:"2023-01-20",price:42,mom:-1.2,low:36,high:58,packs:30,era:"sv",history:[56,54,52,49,47,45,43,42,41,40,41,42]},
"Violet ex Booster Box (sv1V)":{release:"2023-01-20",price:41,mom:-1.5,low:35,high:56,packs:30,era:"sv",history:[54,53,50,48,46,44,42,41,40,39,40,41]},
"Triplet Beat Booster Box (sv1a)":{release:"2023-03-10",price:60,mom:3.2,low:38,high:63,packs:30,era:"sv",history:[39,41,43,45,48,50,53,55,56,57,58,60]},
"Clay Burst Booster Box (sv2D)":{release:"2023-04-14",price:50,mom:1.8,low:35,high:55,packs:30,era:"sv",history:[37,38,39,42,44,46,48,48,47,48,49,50]},
"Snow Hazard Booster Box (sv2P)":{release:"2023-04-14",price:46,mom:1.5,low:34,high:49,packs:30,era:"sv",history:[35,37,38,39,41,42,43,44,45,44,45,46]},
"Pokemon Card 151 Booster Box (sv2a)":{release:"2023-06-16",price:87,mom:4.5,low:44,high:92,packs:20,era:"sv",history:[46,49,53,58,63,67,72,75,78,82,84,87]},
"Ruler of the Black Flame Booster Box (sv3)":{release:"2023-07-28",price:56,mom:3.0,low:39,high:59,packs:30,era:"sv",history:[41,42,44,46,48,49,51,52,53,54,55,56]},
"Raging Surf Booster Box (sv3a)":{release:"2023-09-22",price:53,mom:2.8,low:37,high:56,packs:30,era:"sv",history:[39,38,40,42,44,46,48,49,50,51,52,53]},
"Ancient Roar Booster Box (sv4K)":{release:"2023-10-27",price:39,mom:-2.1,low:33,high:49,packs:30,era:"sv",history:[48,46,44,42,43,42,40,39,38,37,38,39]},
"Future Flash Booster Box (sv4M)":{release:"2023-10-27",price:38,mom:-0.5,low:35,high:48,packs:30,era:"sv",history:[46,45,43,42,40,39,37,36,36,37,37,38]},
"Shiny Treasure ex Booster Box (sv4a)":{release:"2023-12-01",price:65,mom:2.0,low:46,high:69,packs:10,era:"sv",history:[49,51,53,55,56,58,60,61,63,62,64,65]},
"Wild Force Booster Box (sv5K)":{release:"2024-01-26",price:39,mom:1.0,low:33,high:42,packs:30,era:"sv",history:[37,36,35,34,34,33,34,35,36,37,38,39]},
"Crimson Haze Booster Box (sv5A)":{release:"2024-03-22",price:35,mom:-1.5,low:32,high:39,packs:30,era:"sv",history:[38,37,37,36,35,35,34,34,35,36,36,35]},
"Cyber Judge Booster Box (sv5M)":{release:"2024-03-22",price:42,mom:2.2,low:34,high:43,packs:30,era:"sv",history:[35,35,36,37,37,38,39,39,40,40,41,42]},
"Mask of Change Booster Box (sv6)":{release:"2024-04-26",price:39,mom:1.2,low:34,high:42,packs:30,era:"sv",history:[39,38,37,35,34,34,35,35,37,37,38,39]},
"Night Wanderer Booster Box (sv6a)":{release:"2024-06-07",price:42,mom:3.1,low:33,high:44,packs:30,era:"sv",history:[34,33,35,35,36,37,37,38,39,40,41,42]},
"Stellar Miracle Booster Box (sv7)":{release:"2024-07-19",price:38,mom:0.5,low:34,high:40,packs:30,era:"sv",history:[39,38,37,35,34,34,35,35,36,37,37,38]},
"Paradise Dragona Booster Box (sv7a)":{release:"2024-09-13",price:40,mom:1.0,low:35,high:42,packs:30,era:"sv",history:[39,39,37,36,35,36,37,37,38,39,39,40]},
"Super Electric Breaker Booster Box (sv8)":{release:"2024-10-18",price:37,mom:-0.8,low:34,high:40,packs:30,era:"sv",history:[39,39,38,37,37,35,35,34,35,35,36,37]},
"Terastal Festival ex Booster Box (sv8a)":{release:"2024-12-06",price:44,mom:2.5,low:37,high:46,packs:10,era:"sv",history:[39,39,38,37,38,39,39,41,42,42,43,44]},
"Battle Partners Booster Box (sv9)":{release:"2025-01-24",price:37,mom:3.5,low:32,high:38,packs:30,era:"sv",history:[35,35,34,35,35,34,35,35,36,35,36,37]},
"Heat Wave Arena Booster Box (sv9a)":{release:"2025-03-14",price:35,mom:0.8,low:32,high:37,packs:30,era:"sv",history:[36,35,35,34,33,32,33,34,34,35,34,35]},
"Glory of Team Rocket Booster Box (sv10)":{release:"2025-04-18",price:46,mom:5.2,low:37,high:46,packs:30,era:"sv",history:[37,38,39,41,42,42,43,44,44,44,45,46]},
"Black Bolt Booster Box (sv11B)":{release:"2025-06-06",price:37,mom:0,low:37,high:37,packs:30,era:"sv",history:[37]},
"Black Bolt Deluxe Booster Box (sv11B)":{release:"2025-06-06",price:56,mom:0,low:56,high:56,packs:30,era:"sv",history:[56]},
"White Flare Booster Box (sv11w)":{release:"2025-06-06",price:37,mom:0,low:37,high:37,packs:30,era:"sv",history:[37]},
"White Flare Deluxe Booster Box (sv11w)":{release:"2025-06-06",price:56,mom:0,low:56,high:56,packs:30,era:"sv",history:[56]},
"Mega Brave Booster Box (m1L)":{release:"2025-08-01",price:37,mom:0,low:37,high:37,packs:30,era:"m",history:[37]},
"Mega Symphonia Booster Box (m1S)":{release:"2025-08-01",price:37,mom:0,low:37,high:37,packs:30,era:"m",history:[37]},
"Inferno X Booster Box (M2)":{release:"2025-09-26",price:37,mom:0,low:37,high:37,packs:30,era:"m",history:[37]},
"Mega Dream ex Booster Box (M2a)":{release:"2025-11-28",price:37,mom:0,low:37,high:37,packs:10,era:"m",history:[37]},
"Munikis Zero Booster Box (M3)":{release:"2026-01-23",price:37,mom:0,low:37,high:37,packs:30,era:"m",history:[37]},
"Ninja Spinner Booster Box (M4)":{release:"2026-03-13",price:37,mom:0,low:37,high:37,packs:30,era:"m",history:[37]}
};

const fmt=v=>"$"+v.toFixed(2);
let products=[], chart=null;

fetch("/products.json").then(r=>r.json()).then(data=>{products=data;render()}).catch(()=>{
  products=Object.keys(MARKET).map(name=>({name,image:`/images/${name}.png`}));render();
});

function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const f=document.querySelector(".filter-btn.active").dataset.filter;
  const filtered=products.filter(p=>{
    const d=MARKET[p.name];if(!d)return false;
    const match=p.name.toLowerCase().includes(q);
    const era=f==="all"||d.era===f;
    return match&&era;
  }).sort((a,b)=>new Date(MARKET[b.name].release)-new Date(MARKET[a.name].release));
  const grid=document.getElementById("grid");
  grid.innerHTML=filtered.length?filtered.map(p=>{
    const d=MARKET[p.name];
    const cls=d.mom>0?"rising":d.mom<0?"falling":"stable";
    const arrow=d.mom>0?"▲":d.mom<0?"▼":"●";
    const code=p.name.match(/\(([^)]+)\)/)?.[1]||"";
    return`<div class="card" onclick="openModal('${p.name.replace(/'/g,"\\'")}')">
      <img src="${p.image}" alt="${p.name}" onerror="this.style.display='none'">
      <div class="card-info">
        <div class="card-name" title="${p.name}">${p.name.replace(/ Booster Box.*/,"")}</div>
        <div class="card-code">${code} · Released ${d.release}</div>
        <div class="card-price">${fmt(d.price)}</div>
        <div class="pill ${cls}">${arrow} ${Math.abs(d.mom)}% MoM</div>
        <div class="card-meta">
          <div>52w Low: <b>${fmt(d.low)}</b></div>
          <div>52w High: <b>${fmt(d.high)}</b></div>
          <div>Packs: <b>${d.packs}</b></div>
        </div>
      </div>
    </div>`;
  }).join(""):'<div class="empty">No products match your search.</div>';
  document.getElementById("count").textContent=`${filtered.length} of ${products.length} sets`;
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("filters").addEventListener("click",e=>{
  if(!e.target.classList.contains("filter-btn"))return;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");render();
});

function openModal(name){
  const d=MARKET[name];if(!d)return;
  const p=products.find(x=>x.name===name);
  document.getElementById("m-img").src=p?.image||"";
  document.getElementById("m-name").textContent=name;
  document.getElementById("m-code").textContent=(name.match(/\(([^)]+)\)/)?.[1]||"")+" · Released "+d.release;
  document.getElementById("m-price").textContent=fmt(d.price);
  const cls=d.mom>0?"rising":d.mom<0?"falling":"stable";
  const arrow=d.mom>0?"▲":d.mom<0?"▼":"●";
  document.getElementById("m-pill").innerHTML=`<span class="pill ${cls}">${arrow} ${Math.abs(d.mom)}% MoM</span>`;
  document.getElementById("m-stats").innerHTML=`
    <div class="stat-box"><div class="label">52-Week Low</div><div class="value">${fmt(d.low)}</div></div>
    <div class="stat-box"><div class="label">52-Week High</div><div class="value">${fmt(d.high)}</div></div>
    <div class="stat-box"><div class="label">Packs / Box</div><div class="value">${d.packs}</div></div>`;
  document.getElementById("modal").classList.add("open");
  if(chart)chart.destroy();
  const labels=d.history.map((_,i)=>{const dt=new Date(d.release);dt.setMonth(dt.getMonth()+i);return dt.toLocaleDateString("en",{month:"short",year:"2-digit"})});
  chart=new Chart(document.getElementById("m-chart"),{type:"line",data:{labels,datasets:[{label:"Price ($)",data:d.history,borderColor:"#58a6ff",backgroundColor:"#58a6ff20",fill:true,tension:.3,pointRadius:3,pointBackgroundColor:"#58a6ff"}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#8b949e",font:{size:11}},grid:{color:"#30363d"}},y:{ticks:{color:"#8b949e",callback:v=>"$"+v},grid:{color:"#30363d"}}}}});
}

document.getElementById("modal-close").onclick=()=>document.getElementById("modal").classList.remove("open");
document.getElementById("modal").onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove("open")};
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.getElementById("modal").classList.remove("open")});

document.getElementById("theme-toggle").onclick=()=>{
  const html=document.documentElement;
  const isLight=html.getAttribute("data-theme")==="light";
  html.setAttribute("data-theme",isLight?"dark":"light");
  document.querySelector(".icon-moon").style.display=isLight?"block":"none";
  document.querySelector(".icon-sun").style.display=isLight?"none":"block";
};
</script>
</body>
</html>
