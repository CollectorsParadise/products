<!DOCTYPE html>
<html>
<head>
  <title>Pokémon Product List</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .product { display: flex; align-items: center; margin-bottom: 20px; }
    .product img { width: 150px; margin-right: 20px; }
  </style>
</head>
<body>

<h1>Pokémon Product List</h1>
<div id="products"></div>

<script>
  fetch("/products.json")
    .then(res => res.json())
    .then(products => {
      const container = document.getElementById("products");
      products.forEach(p => {
        container.innerHTML += `
          <div class="product">
            <img src="${p.image}">
            <div>${p.name}</div>
          </div>
        `;
      });
    });
</script>

</body>
</html>
